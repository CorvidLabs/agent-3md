name: publish

# Publishes @corvidlabs/agent3md to GitHub Packages on each GitHub release.
# The built-in GITHUB_TOKEN authenticates to npm.pkg.github.com (packages:write).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@corvidlabs"
      - run: bun install --frozen-lockfile
      - name: Sync version to the release tag
        if: github.event_name == 'release'
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
