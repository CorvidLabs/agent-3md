name: publish

# Publishes @corvidlabs/agent3md to the public npm registry on each GitHub release.
# Authenticates via npm Trusted Publishers (OIDC) — no NPM_TOKEN secret needed.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@corvidlabs"
      - run: bun install --frozen-lockfile
      - name: Sync version to the release tag
        if: github.event_name == 'release'
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}
      - run: npm publish --provenance --access public
