name: trust

on:
  # Skip the gate for documentation-only changes (nothing code to verify).
  # Anything touching src/, loaders/, specs/, SPEC.md, or examples still runs.
  pull_request:
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
  workflow_dispatch:

jobs:
  trust:
    # macOS so the verify lane can build the Swift loader alongside TS and Rust.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # augur/attest need full history

      - name: Install fledge (prebuilt release binary)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/fledge" \
            https://github.com/CorvidLabs/fledge/releases/latest/download/fledge-macos-aarch64
          chmod +x "$HOME/.local/bin/fledge"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/fledge" --version

      # The verify lane's TypeScript task runs via bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Lifecycle: the single gate runs the TypeScript reference (test + typed
      # build) plus the Rust and Swift loaders and spec-sync.
      - name: Verify lane
        run: fledge lanes run verify

      # Contracts: specs must stay in sync with source.
      - name: Spec sync
        uses: CorvidLabs/spec-sync@v4.5.0
        with:
          strict: "true"

      # Risk: enforced, deterministic, low false-positive.
      - name: Augur risk gate
        uses: CorvidLabs/augur@v0.4.0
        with:
          range: origin/main..HEAD
          threshold: block

      # Trust: soft until a signing key and richer policy land.
      - name: Attest verify
        uses: CorvidLabs/attest@v0.4.0
        with:
          range: origin/main..HEAD
          policy: .attest.json
        continue-on-error: true

      # Durability: fail if the standing rules block was removed.
      - name: Trust block present
        run: grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
