name: trust

on:
  # Skip the gate for documentation-only changes (nothing code to verify).
  # Anything touching src/, loaders/, specs/, SPEC.md, or examples still runs.
  pull_request:
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
  workflow_dispatch:

# The gates only read the repo; never grant write to GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  trust:
    # macOS so the verify lane can build the Swift loader alongside TS and Rust.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # augur/attest need full history

      # The verify lane's TypeScript task runs via bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Fledge for pre-Trust verification
        env:
          FLEDGE_SHA256: 21d0916d52ef14e6d33e3967417773369e047a0311e66bbb1eecc8f69332a040
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/pretrust-fledge"
          mkdir -p "${install_dir}"
          curl -fsSL \
            "https://github.com/CorvidLabs/fledge/releases/download/v1.7.0/fledge-macos-aarch64" \
            -o "${install_dir}/fledge"
          actual="$(shasum -a 256 "${install_dir}/fledge" | awk '{print $1}')"
          if [ "${actual}" != "${FLEDGE_SHA256}" ]; then
            echo "::error::Fledge 1.7.0 checksum mismatch"
            exit 1
          fi
          chmod +x "${install_dir}/fledge"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      # Preserve the former strict SpecSync gate and put its verified binary on
      # PATH before Trust invokes the repository lifecycle lane.
      - name: Strict SpecSync gate
        uses: CorvidLabs/spec-sync@a89d827e93fa0bc9e6168447e66a0ad30fa92e65 # v5.1.1
        with:
          version: "5.1.1"
          strict: "true"
          require-coverage: "100"

      # Unified lifecycle, contract, risk, and progressive provenance gate.
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@a239f78658e5ad0f12fa230f494890e40c6e4d7b # v1.1.1

      # Durability: fail if the standing rules block was removed.
      - name: Trust block present
        run: |
          grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
